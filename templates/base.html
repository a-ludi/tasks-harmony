<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tasks Harmony{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <img src="/static/icon.svg" width="28" height="28" alt="">
        Tasks Harmony
      </a>
      <div class="ms-auto d-flex align-items-center gap-2">
        {% if user.is_authenticated %}
        <span id="xp-counter" class="navbar-text text-light">XP: {{ user.profile.total_xp }}</span>
        <div class="d-flex">
          <a class="btn btn-outline-light btn-sm rounded-end-0" href="{% url 'profile' %}" title="Profile">
            <i class="bi bi-person-circle"></i>
          </a>
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-outline-light btn-sm rounded-start-0" style="margin-left:-1px" type="submit">Logout</button>
          </form>
        </div>
        {% else %}
        <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <div class="container">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
    window.addEventListener('offline', () => {
      document.querySelectorAll('button[type="submit"], .btn-primary').forEach(btn => {
        btn.disabled = true;
        btn.dataset.offlineDisabled = '1';
      });
    });
    window.addEventListener('online', () => {
      document.querySelectorAll('[data-offline-disabled]').forEach(btn => {
        btn.disabled = false;
        delete btn.dataset.offlineDisabled;
      });
    });
    // Clean up Bootstrap modal backdrop when modal is reset via HTMX OOB swap
    document.body.addEventListener('htmx:afterSwap', function() {
      const modal = document.getElementById('question-modal');
      if (modal && !modal.classList.contains('show')) {
        document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
        document.body.classList.remove('modal-open');
        document.body.style.overflow = '';
        document.body.style.paddingRight = '';
      }
    });
  </script>
</body>
</html>
