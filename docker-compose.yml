version: '3.3'

services:
  sync:
    build: ./sync-server
    volumes:
      - ${SOCKET_DIR}:/run/sync
      - sync-data:/data
    environment:
      - SYNC_APP_SECRET=${SYNC_APP_SECRET}
      - REDIS_URL=redis://redis:6379
      - SYNC_SOCKET=/run/sync/sync.sock
      - SYNC_BLOB_DIR=/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  sync-data:
  redis-data:
