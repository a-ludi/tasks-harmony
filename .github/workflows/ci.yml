name: CI

on:
  push:
    branches-ignore: [main]
  workflow_call:
    outputs:
      artifact-id:
        description: "GitHub artifact ID of the production build"
        value: ${{ jobs.build.outputs.artifact-id }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browser
        run: bunx playwright install --with-deps ${{ matrix.browser }}

      - name: E2E tests
        run: bunx playwright test --project=${{ matrix.browser }}

  version-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Fail if version is already released
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p "require('./package.json').version")
          if gh release view "v${version}" &>/dev/null; then
            echo "v${version} is already released. Bump the version in package.json before merging."
            exit 1
          fi
          echo "v${version} is not yet released — OK."

  sync-server-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sync-server
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run tsc --noEmit

      - name: Unit tests
        run: bun test

  build:
    needs: [check, e2e, sync-server-check]
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1

      - name: Install dependencies
        run: bun install

      - name: Build
        env:
          VITE_SYNC_APP_SECRET: ${{ secrets.SYNC_APP_SECRET }}
          VITE_SYNC_URL: ${{ vars.SYNC_URL }}
        run: bun run build

      - name: Upload build artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: dist/
          retention-days: 7
          if-no-files-found: error
